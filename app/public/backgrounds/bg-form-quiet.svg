      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.22"/>
      </feComponentTransfer>
    </filter>
    <pattern id="fiberLines" width="180" height="180" patternUnits="userSpaceOnUse" patternTransform="rotate(32)">
