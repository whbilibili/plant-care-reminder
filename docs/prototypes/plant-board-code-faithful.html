<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>植物看板代码高还原原型</title>
    <style>
      :root {
        --color-ink: #16342f;
        --color-muted: #637b71;
        --color-paper: #fbfcf7;
        --color-mist: #edf5f1;
        --color-surface: #ffffff;
        --color-leaf: #1f473d;
        --color-leaf-light: #467061;
        --color-line: #d8e4da;
        --color-warning: #dd6b20;
        --color-task-watering: #3b82c4;
        --color-task-misting: #2f9c8a;
        --font-heading: Lora, Georgia, "Times New Roman", serif;
        --font-body: Raleway, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
        --space-xs: 4px;
        --space-sm: 8px;
        --space-md: 16px;
        --space-lg: 24px;
        --radius-card: 16px;
        --radius-button: 12px;
        --radius-pill: 999px;
        --gradient-botanical: linear-gradient(135deg, rgba(235, 246, 238, 0.95), rgba(246, 249, 239, 0.88));
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #edf4ef;
        color: var(--color-ink);
        font-family: var(--font-body);
      }

      button,
      input {
        font: inherit;
      }

      .stage {
        min-height: 100vh;
        display: grid;
        place-items: start center;
        padding: 24px 14px;
      }

      .phone {
        width: min(100%, 390px);
        min-height: 844px;
        position: relative;
        overflow: hidden;
        background:
          linear-gradient(180deg, rgba(237, 245, 241, 0.58), rgba(251, 252, 247, 0.98) 240px),
          var(--color-paper);
        border: 1px solid rgba(216, 228, 218, 0.95);
        box-shadow: 0 20px 48px rgba(22, 52, 47, 0.12);
      }

      .main {
        width: min(100%, 520px);
        min-height: 100%;
        margin: 0 auto;
        padding: var(--space-lg) var(--space-md) 176px;
        display: flex;
        flex-direction: column;
        gap: var(--space-md);
      }

      .header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: var(--space-md);
      }

      h1 {
        margin: 0;
        font-family: var(--font-heading);
        font-size: 28px;
        font-weight: 800;
        line-height: 1.2;
        color: var(--color-ink);
      }

      .subtitle {
        margin: 4px 0 0;
        font-size: 14px;
        font-weight: 400;
        color: var(--color-muted);
      }

      .add-link {
        margin: 0;
        padding: 4px 0;
        border: 0;
        background: none;
        color: var(--color-leaf);
        cursor: pointer;
        font-size: 15px;
        font-weight: 600;
        white-space: nowrap;
      }

      .search-wrap {
        position: relative;
        display: flex;
        align-items: center;
      }

      .search-icon {
        position: absolute;
        left: 12px;
        display: flex;
        align-items: center;
        pointer-events: none;
        color: var(--color-muted);
      }

      .search-input {
        width: 100%;
        height: 44px;
        padding: 0 var(--space-md) 0 38px;
        border: 0;
        outline: 0;
        border-radius: var(--radius-pill);
        background: var(--color-mist);
        color: var(--color-ink);
        font-size: 14px;
      }

      .segmented {
        position: relative;
        display: flex;
        height: 42px;
        padding: 4px;
        border: 1px solid rgba(216, 228, 218, 0.6);
        border-radius: 14px;
        background: rgba(237, 245, 241, 0.74);
      }

      .indicator {
        position: absolute;
        top: 4px;
        left: 4px;
        bottom: 4px;
        width: calc((100% - 8px) / 2);
        border-radius: 11px;
        background: rgba(255, 255, 255, 0.94);
        box-shadow: 0 8px 18px rgba(22, 52, 47, 0.07);
        transform: translateX(100%);
        pointer-events: none;
      }

      .segmented button {
        flex: 1;
        position: relative;
        z-index: 1;
        border: 0;
        background: transparent;
        color: var(--color-muted);
        cursor: pointer;
        font-size: 13px;
        font-weight: 600;
        line-height: 1;
        padding: 0;
      }

      .segmented button.active {
        color: var(--color-leaf);
        font-weight: 800;
      }

      .group-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .group-block {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .group-header {
        appearance: none;
        width: 100%;
        min-height: 58px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 10px 14px;
        border: 1px solid var(--color-line);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.82);
        color: var(--color-ink);
        cursor: pointer;
        box-shadow: 0 1px 0 rgba(255, 255, 255, 0.75);
      }

      .group-copy {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 3px;
      }

      .group-title-row {
        display: flex;
        align-items: baseline;
        gap: 7px;
      }

      .group-title {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        text-align: left;
        font-size: 16px;
        font-weight: 800;
      }

      .group-count {
        flex-shrink: 0;
        color: var(--color-muted);
        font-size: 13px;
        font-weight: 700;
      }

      .group-meta {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        color: var(--color-muted);
        font-size: 12px;
        font-weight: 650;
      }

      .group-arrow {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 34px;
        height: 34px;
        border-radius: 999px;
        background: var(--color-mist);
        flex-shrink: 0;
        color: var(--color-muted);
      }

      .group-content {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .plant-card {
        display: flex;
        align-items: stretch;
        gap: 12px;
        padding: 12px;
        border: 1px solid var(--color-line);
        border-radius: var(--radius-card);
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        cursor: pointer;
        overflow: hidden;
      }

      .photo-slot {
        flex-shrink: 0;
        width: 82px;
        height: 82px;
        display: grid;
        place-items: center;
        overflow: hidden;
        border-radius: 14px;
        background: var(--color-mist);
      }

      .avatar {
        width: 82px;
        height: 82px;
        display: grid;
        place-items: center;
        border-radius: inherit;
        background: var(--gradient-botanical);
        color: var(--color-leaf);
      }

      .avatar svg {
        width: 37px;
        height: 37px;
        stroke-width: 1.75;
      }

      .plant-content {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 6px;
      }

      .name-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: var(--space-sm);
      }

      .plant-name {
        margin: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        color: var(--color-ink);
        font-family: var(--font-heading);
        font-size: 19px;
        font-weight: 700;
        line-height: 1.3;
      }

      .chevron {
        flex-shrink: 0;
        display: flex;
        color: var(--color-muted);
      }

      .location {
        margin: 0;
        display: flex;
        align-items: center;
        gap: 4px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        color: var(--color-muted);
        font-size: 13px;
      }

      .pill {
        align-self: flex-start;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 5px 10px;
        border-radius: var(--radius-pill);
        background: rgba(45, 140, 100, 0.08);
        color: var(--color-leaf);
        font-size: 12px;
        font-weight: 600;
        line-height: 1.3;
      }

      .pill.overdue {
        background: rgba(235, 87, 87, 0.08);
        color: var(--color-warning);
      }

      .last-care {
        margin: 0;
        color: var(--color-muted);
        font-size: 12px;
      }

      .sync {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        padding: var(--space-md) 0;
      }

      .sync-top {
        display: flex;
        align-items: center;
        gap: 6px;
        color: var(--color-ink);
        font-size: 13px;
        font-weight: 600;
      }

      .sync-sub {
        margin: 0;
        color: var(--color-muted);
        font-size: 12px;
      }

      .bottom-nav {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 50;
        padding: var(--space-sm) var(--space-md) var(--space-sm);
        border-top: 1px solid var(--color-line);
        background: var(--color-paper);
      }

      .nav-inner {
        width: min(100%, 520px);
        margin: 0 auto;
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: var(--space-sm);
      }

      .nav-item {
        height: 56px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: var(--space-xs);
        border: 1px solid transparent;
        border-radius: var(--radius-button);
        background: transparent;
        color: var(--color-muted);
        font-size: 11px;
        font-weight: 600;
      }

      .nav-item.active {
        background: var(--color-leaf);
        color: var(--color-paper);
        font-weight: 700;
        box-shadow: 0 6px 16px rgba(31, 71, 61, 0.28);
      }

      @media (max-width: 374px) {
        .photo-slot,
        .avatar {
          width: 76px;
          height: 76px;
        }

        .avatar svg {
          width: 34px;
          height: 34px;
        }

        .plant-card {
          gap: 12px;
          padding: 14px;
        }
      }
    </style>
  </head>
  <body>
    <main class="stage">
      <section class="phone" aria-label="植物看板代码高还原原型">
        <div class="main">
          <header class="header">
            <div>
              <h1>植物看板</h1>
              <p class="subtitle">8 盆植物 · 家人一起照顾</p>
            </div>
            <button class="add-link" type="button">+ 添加</button>
          </header>

          <label class="search-wrap">
            <span class="search-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"></circle><path d="m20 20-3.5-3.5"></path></svg>
            </span>
            <input class="search-input" placeholder="按名称或位置搜索" />
          </label>

          <div class="segmented" role="tablist" aria-label="植物视图">
            <span class="indicator" aria-hidden="true"></span>
            <button type="button">全部</button>
            <button class="active" type="button">按房间</button>
          </div>

          <section class="group-list" aria-label="按房间分组">
            <article class="group-block">
              <button class="group-header" type="button" aria-expanded="false">
                <span class="group-copy">
                  <span class="group-title-row">
                    <span class="group-title">阳台</span>
                    <span class="group-count">3 盆</span>
                  </span>
                  <span class="group-meta">最早明天 · 1 项浇水</span>
                </span>
                <span class="group-arrow" aria-hidden="true">
                  <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"></path></svg>
                </span>
              </button>
            </article>

            <article class="group-block">
              <button class="group-header" type="button" aria-expanded="false">
                <span class="group-copy">
                  <span class="group-title-row">
                    <span class="group-title">客厅角落</span>
                    <span class="group-count">1 盆</span>
                  </span>
                  <span class="group-meta">暂无明天到期任务</span>
                </span>
                <span class="group-arrow" aria-hidden="true">
                  <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"></path></svg>
                </span>
              </button>
            </article>

            <article class="group-block">
              <button class="group-header" type="button" aria-expanded="true">
                <span class="group-copy">
                  <span class="group-title-row">
                    <span class="group-title">客厅窗台</span>
                    <span class="group-count">1 盆</span>
                  </span>
                  <span class="group-meta">明天 · 绿萝需要喷雾</span>
                </span>
                <span class="group-arrow" aria-hidden="true">
                  <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="m18 15-6-6-6 6"></path></svg>
                </span>
              </button>
              <div class="group-content">
                <article class="plant-card">
                  <div class="photo-slot">
                    <div class="avatar" role="img" aria-label="绿萝默认头像">
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M7 20h10"></path><path d="M10 20c5.5-2.5.8-6.4 3-10"></path><path d="M9.5 9.4c1.1 1.6 2.6 2.5 4.5 2.6"></path><path d="M8.3 8.2C7.2 6.8 5.5 6 3 6c0 2.9 1.9 5 4.6 5.5"></path><path d="M15 11c3.2-.8 5-2.8 5-6-3 0-5.2 1.4-6.2 3.8"></path></svg>
                    </div>
                  </div>
                  <div class="plant-content">
                    <div class="name-row">
                      <h2 class="plant-name">绿萝</h2>
                      <span class="chevron" aria-hidden="true">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"></path></svg>
                      </span>
                    </div>
                    <p class="location">
                      <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 10c0 6-8 12-8 12S4 16 4 10a8 8 0 1 1 16 0Z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                      客厅窗台
                    </p>
                    <span class="pill">
                      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="var(--color-task-misting)" stroke-width="2"><path d="M7 14h10"></path><path d="M8 18h8"></path><path d="M9 10h6"></path><path d="M12 3v4"></path></svg>
                      明天到期 喷雾
                      <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"></path></svg>
                    </span>
                    <p class="last-care">上次养护 1 天前</p>
                  </div>
                </article>
              </div>
            </article>

            <article class="group-block">
              <button class="group-header" type="button" aria-expanded="true">
                <span class="group-copy">
                  <span class="group-title-row">
                    <span class="group-title">卧室</span>
                    <span class="group-count">1 盆</span>
                  </span>
                  <span class="group-meta">明天 · 文竹需要喷雾</span>
                </span>
                <span class="group-arrow" aria-hidden="true">
                  <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="m18 15-6-6-6 6"></path></svg>
                </span>
              </button>
              <div class="group-content">
                <article class="plant-card">
                  <div class="photo-slot">
                    <div class="avatar" role="img" aria-label="文竹默认头像">
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M7 20h10"></path><path d="M10 20c5.5-2.5.8-6.4 3-10"></path><path d="M9.5 9.4c1.1 1.6 2.6 2.5 4.5 2.6"></path><path d="M8.3 8.2C7.2 6.8 5.5 6 3 6c0 2.9 1.9 5 4.6 5.5"></path><path d="M15 11c3.2-.8 5-2.8 5-6-3 0-5.2 1.4-6.2 3.8"></path></svg>
                    </div>
                  </div>
                  <div class="plant-content">
                    <div class="name-row">
                      <h2 class="plant-name">文竹</h2>
                      <span class="chevron" aria-hidden="true">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"></path></svg>
                      </span>
                    </div>
                    <p class="location">
                      <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 10c0 6-8 12-8 12S4 16 4 10a8 8 0 1 1 16 0Z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                      卧室
                    </p>
                    <span class="pill">
                      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="var(--color-task-misting)" stroke-width="2"><path d="M7 14h10"></path><path d="M8 18h8"></path><path d="M9 10h6"></path><path d="M12 3v4"></path></svg>
                      明天到期 喷雾
                      <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"></path></svg>
                    </span>
                    <p class="last-care">上次养护 1 天前</p>
                  </div>
                </article>
              </div>
            </article>

            <article class="group-block">
              <button class="group-header" type="button" aria-expanded="true">
                <span class="group-copy">
                  <span class="group-title-row">
                    <span class="group-title">厨房</span>
                    <span class="group-count">1 盆</span>
                  </span>
                  <span class="group-meta">明天 · 薄荷需要浇水</span>
                </span>
                <span class="group-arrow" aria-hidden="true">
                  <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="m18 15-6-6-6 6"></path></svg>
                </span>
              </button>
              <div class="group-content">
                <article class="plant-card">
                  <div class="photo-slot">
                    <div class="avatar" role="img" aria-label="薄荷默认头像">
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M7 20h10"></path><path d="M10 20c5.5-2.5.8-6.4 3-10"></path><path d="M9.5 9.4c1.1 1.6 2.6 2.5 4.5 2.6"></path><path d="M8.3 8.2C7.2 6.8 5.5 6 3 6c0 2.9 1.9 5 4.6 5.5"></path><path d="M15 11c3.2-.8 5-2.8 5-6-3 0-5.2 1.4-6.2 3.8"></path></svg>
                    </div>
                  </div>
                  <div class="plant-content">
                    <div class="name-row">
                      <h2 class="plant-name">薄荷</h2>
                      <span class="chevron" aria-hidden="true">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"></path></svg>
                      </span>
                    </div>
                    <p class="location">
                      <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 10c0 6-8 12-8 12S4 16 4 10a8 8 0 1 1 16 0Z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                      厨房
                    </p>
                    <span class="pill">
                      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="var(--color-task-watering)" stroke-width="2"><path d="M12 3.5S6 10 6 14.5a6 6 0 0 0 12 0C18 10 12 3.5 12 3.5Z"></path></svg>
                      明天到期 浇水
                      <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"></path></svg>
                    </span>
                    <p class="last-care">上次养护 2 天前</p>
                  </div>
                </article>
              </div>
            </article>
          </section>

          <section class="sync">
            <div class="sync-top">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="var(--color-leaf)" stroke-width="2"><path d="M9 12l2 2 4-4"></path><circle cx="12" cy="12" r="9"></circle></svg>
              <span>养护记录已与家人同步</span>
            </div>
            <p class="sync-sub">所有更新都会自动同步到家庭空间</p>
          </section>
        </div>

        <nav class="bottom-nav" aria-label="主导航">
          <div class="nav-inner">
            <div class="nav-item">
              <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="5" width="16" height="16" rx="2"></rect><path d="M16 3v4"></path><path d="M8 3v4"></path><path d="M4 11h16"></path><path d="m9 16 2 2 4-4"></path></svg>
              <span>待办</span>
            </div>
            <div class="nav-item active">
              <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 20h10"></path><path d="M10 20c5.5-2.5.8-6.4 3-10"></path><path d="M9.5 9.4c1.1 1.6 2.6 2.5 4.5 2.6"></path><path d="M8.3 8.2C7.2 6.8 5.5 6 3 6c0 2.9 1.9 5 4.6 5.5"></path><path d="M15 11c3.2-.8 5-2.8 5-6-3 0-5.2 1.4-6.2 3.8"></path></svg>
              <span>植物</span>
